# Render Blueprint: https://render.com/docs/blueprint-spec
# After first deploy, set MONGODB_URI, JWT_SECRET, and FRONTEND_URL in the service → Environment.

services:
  - type: web
    name: interim-assessment-api
    runtime: node
    rootDir: .
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
